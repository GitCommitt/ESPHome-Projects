esphome:
  name: lcd1602
  friendly_name: LCD Screen 

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
  variant: esp32s3

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: ""

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

i2c:
  sda: 8
  scl: 9
  scan: true

text_sensor:
  - platform: homeassistant
    name: "LCD Text Input"
    entity_id: input_text.lcd_line_1
    id: lcd_text_input
    on_value:
      then:
        - component.update: my_lcd

display:
  - platform: lcd_pcf8574
    dimensions: 16x2
    address: 0x27
    id: my_lcd
    update_interval: 1s
    lambda: |-
      if (id(lcd_text_input).has_state()) {
        it.clear();
        std::string text = id(lcd_text_input).state;
        
        std::string top_line = text.substr(0, 16);
        it.print(0, 0, top_line.c_str());
        
        if (text.length() > 16) {
          std::string bottom_line = text.substr(16, 16);
          it.print(0, 1, bottom_line.c_str());
        }
      }
